<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CAMPOAMOR - Máquina Futura</title>

<style>
:root {
    --campoamor-brown: #4A372C;
    --campoamor-dark: #2A1F19;
    --campoamor-cream: #F5F1EC;
    --campoamor-sand: #D8C3A9;
    --campoamor-white: #FFFFFF;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    min-height:100vh;
    font-family:Arial, Helvetica, sans-serif;

    background:
        radial-gradient(circle at top left, rgba(216,195,169,0.18), transparent 32%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.06), transparent 28%),
        linear-gradient(135deg, #2A1F19 0%, #3B2B22 45%, #4A372C 100%);

    color:white;
    overflow:hidden;
}

body::before{
    content:"";
    position:fixed;
    inset:0;

    background:
        repeating-linear-gradient(
            120deg,
            rgba(255,255,255,0.018) 0px,
            rgba(255,255,255,0.018) 3px,
            transparent 3px,
            transparent 24px
        );

    opacity:0.45;
    pointer-events:none;
}

.app{
    position:relative;
    z-index:2;

    min-height:100vh;

    padding:30px;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:space-between;
}

/* LOGO */

.logo-card{
    width:min(920px,92vw);

    background:rgba(255,255,255,1);

    border-radius:36px;

    padding:28px 60px;

    box-shadow:
        0 30px 80px rgba(0,0,0,0.35);

    margin-top:10px;
}

.logo-card img{
    width:100%;
    max-height:140px;
    object-fit:contain;
    display:block;
}

/* BANNER */

.machine-banner{

    margin-top:26px;

    background:rgba(255,255,255,0.14);

    border:1px solid rgba(255,255,255,0.18);

    backdrop-filter:blur(8px);

    border-radius:28px;

    padding:18px 46px;

    font-size:clamp(30px,4vw,62px);

    font-weight:900;

    letter-spacing:4px;

    box-shadow:
        0 18px 42px rgba(0,0,0,0.25);
}

/* TARJETA RELOJ */

.hero{

    width:min(1500px,96vw);

    background:rgba(245,241,236,0.98);

    color:var(--campoamor-dark);

    border-radius:48px;

    padding:
        clamp(40px,5vw,75px)
        clamp(60px,7vw,120px);

    box-shadow:
        0 35px 90px rgba(0,0,0,0.38);

    margin:auto;
}

.label{

    text-align:center;

    font-size:clamp(18px,2vw,30px);

    font-weight:900;

    letter-spacing:6px;

    text-transform:uppercase;

    color:#7A6758;

    margin-bottom:22px;
}

.clock{

    text-align:center;

    font-size:clamp(120px,18vw,280px);

    line-height:0.9;

    font-weight:900;

    letter-spacing:-8px;

    color:var(--campoamor-brown);

    text-shadow:
        0 10px 0 rgba(216,195,169,0.45);
}

.date{

    margin-top:30px;

    text-align:center;

    font-size:clamp(28px,3vw,56px);

    font-weight:900;
}

/* FOOTER */

.footer{

    display:flex;

    align-items:center;

    gap:18px;

    margin-bottom:14px;
}

.pill{

    background:rgba(255,255,255,0.14);

    border:1px solid rgba(255,255,255,0.16);

    border-radius:999px;

    padding:12px 22px;

    font-weight:800;

    backdrop-filter:blur(8px);
}

button{

    border:none;

    border-radius:999px;

    padding:14px 24px;

    background:white;

    color:var(--campoamor-brown);

    font-size:18px;

    font-weight:900;

    cursor:pointer;

    box-shadow:
        0 12px 28px rgba(0,0,0,0.20);

    transition:0.15s;
}

button:hover{
    transform:translateY(-2px);
}

/* ANIMACIÓN CADA HORA */

.hour-message{

    position:fixed;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%);

    background:white;

    color:var(--campoamor-brown);

    padding:30px 50px;

    border-radius:34px;

    font-size:clamp(38px,5vw,90px);

    font-weight:900;

    box-shadow:
        0 30px 90px rgba(0,0,0,0.45);

    opacity:0;

    z-index:50;
}

.hour-message.show{
    animation:popup 15s ease;
}

.hour-mark .clock{
    animation:clockPulse 15s ease;
}

.hour-mark .machine-banner{
    animation:bannerMove 15s ease;
}

@keyframes popup{

    0%{
        opacity:0;
        transform:translate(-50%,-50%) scale(0.7);
    }

    15%{
        opacity:1;
        transform:translate(-50%,-50%) scale(1.05);
    }

    80%{
        opacity:1;
    }

    100%{
        opacity:0;
        transform:translate(-50%,-50%) scale(0.9);
    }
}

@keyframes clockPulse{

    0%{
        transform:scale(1);
    }

    20%{
        transform:scale(1.08);
    }

    50%{
        transform:scale(1);
    }

    70%{
        transform:scale(1.04);
    }

    100%{
        transform:scale(1);
    }
}

@keyframes bannerMove{

    0%{
        transform:translateY(0);
    }

    20%{
        transform:translateY(-12px);
    }

    40%{
        transform:translateY(0);
    }

    60%{
        transform:translateY(-6px);
    }

    100%{
        transform:translateY(0);
    }
}

/* RESPONSIVE */

@media(max-width:900px){

    .hero{
        border-radius:30px;
        padding:40px 20px;
    }

    .clock{
        letter-spacing:-4px;
    }

    .logo-card{
        padding:20px;
    }

    .machine-banner{
        width:100%;
        text-align:center;
    }
}

</style>
</head>

<body>

<div id="hourMessage" class="hour-message">
    AVISO DE CAMBIO
</div>

<audio id="alarmSound" preload="auto">
    <source src="sirena.mp3" type="audio/mpeg">
</audio>

<div class="app" id="app">

    <div class="logo-card">
        <img src="logo-campoamor.png" alt="Logo Campoamor">
    </div>

    <div class="machine-banner">
        MÁQUINA FUTURA
    </div>

    <div class="hero">

        <div class="label">
            HORA ACTUAL
        </div>

        <div class="clock" id="clock">
            --:--:--
        </div>

        <div class="date" id="date">
            --
        </div>

    </div>

    <div class="footer">

        <div class="pill">
            CAMPOAMOR
        </div>

        <button onclick="toggleFullscreen()">
            ⛶ Pantalla completa
        </button>

    </div>

</div>

<script>

const alarmTimes = [
    "10:00",
        "10:29",
    "14:00",
         "15:28"
];

let lastAlarmEvent = null;

function updateClock(){

    const now = new Date();

    document.getElementById("clock").textContent =
        now.toLocaleTimeString("es-ES",{
            hour:"2-digit",
            minute:"2-digit",
            second:"2-digit"
        });

    document.getElementById("date").textContent =
        now.toLocaleDateString("es-ES",{
            weekday:"long",
            day:"2-digit",
            month:"long",
            year:"numeric"
        });

    const currentTime =
        String(now.getHours()).padStart(2,"0") +
        ":" +
        String(now.getMinutes()).padStart(2,"0");

    const eventKey =
        now.toDateString() + "-" + currentTime;

    if(
        now.getSeconds() === 0 &&
        alarmTimes.includes(currentTime) &&
        lastAlarmEvent !== eventKey
    ){
        lastAlarmEvent = eventKey;
        triggerHourAnimation();
    }
}

function triggerHourAnimation(){

    const app =
        document.getElementById("app");

    const message =
        document.getElementById("hourMessage");

    const sound =
        document.getElementById("alarmSound");

    app.classList.remove("hour-mark");
    message.classList.remove("show");

    void app.offsetWidth;

    app.classList.add("hour-mark");
    message.classList.add("show");

    sound.pause();
    sound.currentTime = 0;

    const playPromise = sound.play();

    if(playPromise !== undefined){
        playPromise.catch(function(){
            console.log("El navegador ha bloqueado el sonido hasta que haya interacción del usuario.");
        });
    }

    setTimeout(()=>{

        sound.pause();
        sound.currentTime = 0;

        app.classList.remove("hour-mark");
        message.classList.remove("show");

    },15000);
}

function toggleFullscreen(){

    if(!document.fullscreenElement){

        document.documentElement.requestFullscreen();

    }else{

        document.exitFullscreen();
    }
}

document.addEventListener("keydown",function(e){

    if(e.key.toLowerCase()==="f"){
        toggleFullscreen();
    }
});

setInterval(updateClock,1000);

updateClock();

</script>

</body>
</html>
